<!DOCTYPE html>
<html>
<head>
<title>MSSQUARE Attendance</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="background">

<div class="login-card">

<div class="logo-circle">
<img src="{{ url_for('static', filename='images/LOGO.png') }}" alt="MSSQUARE Logo">
</div>

<h2>Welcome to MSSQUARE</h2>
<p class="subtitle">Employee Attendance Management System</p>

<select id="role">
<option value="employee">Employee Login</option>

<option value="admin">Admin Login</option>
</select>

<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn">Sign In</button>

<p id="msg"></p>

</div>

</div>


<script>

document.getElementById("loginBtn").addEventListener("click", login);

async function login(){

const username = document.getElementById("username").value.trim();
const password = document.getElementById("password").value;

if(!username || !password){
document.getElementById("msg").innerText = "Please enter username and password";
document.getElementById("msg").style.color = "red";
return;
}

try{

const response = await fetch("http://127.0.0.1:5000/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
password:password
})
});

const data = await response.json();

console.log("LOGIN RESPONSE:",data);

if(response.ok){

localStorage.setItem("token", data.access_token);
localStorage.setItem("role", data.role);

/* redirect using BACKEND ROLE */

localStorage.setItem("token", data.access_token);
localStorage.setItem("role", data.role);

console.log("TOKEN SAVED:", localStorage.getItem("token"));

setTimeout(function(){

    if(data.role === "admin"){
        window.location.href = "admin";
    }
    else{
        window.location.href = "home";
    }

}, 200);

}else{

document.getElementById("msg").innerText = data.message || "Invalid login";
document.getElementById("msg").style.color = "red";

}

}catch(err){

console.error(err);

document.getElementById("msg").innerText = "Server error";
document.getElementById("msg").style.color = "red";

}

}

</script>

</body>
</html>
