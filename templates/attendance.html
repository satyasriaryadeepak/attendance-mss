<!DOCTYPE html>
<html>

<head>
<title>MSSQUARE Attendance</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/attendance.css') }}"></head>

<body>

<header>

<div class="logo">MSSQUARE TECHNOLOGIES</div>

<nav>

<a href="/home">Home</a>
<a href="#">Contact Us</a>
<a href="/attendance">Attendance</a>
<a href="/myprofile">Profile</a>
<a href="#" onclick="siteLogout()">Logout</a>
</nav>


</header>


<section class="attendance-section">

<div class="attendance-card">

<h2>Mark Attendance</h2>

<div class="time-box">
<p>Date : <span id="date"></span></p>
<p>Time : <span id="clock"></span></p>
</div>


<div class="buttons">

<button onclick="login()">Login</button>

<button onclick="breakStart()">Break Start</button>

<button onclick="breakEnd()">Break End</button>

<button onclick="logout()">Logout</button>

</div>


<div class="record">

<h3>Today's Record</h3>

<p>Login : <span id="loginTime">--</span></p>

<p>Break Start : <span id="breakStartTime">--</span></p>

<p>Break End : <span id="breakEndTime">--</span></p>

<p>Logout : <span id="logoutTime">--</span></p>

<p>Status : <span id="status">Not Marked</span></p>

</div>

</div>

</section>


<footer>
<p>© 2026 MSSQUARE Technologies</p>
</footer>


<script>

function siteLogout(){

localStorage.removeItem("token");
localStorage.removeItem("role");

window.location.href = "/";

}

const token = localStorage.getItem("token");

if(!token){
	window.location.href="/";
}

function updateClock(){

const now = new Date();

document.getElementById("date").innerText = now.toLocaleDateString();

document.getElementById("clock").innerText = now.toLocaleTimeString();

}

updateClock();
setInterval(updateClock,1000);



async function login(){

	const token = localStorage.getItem("token");
	try{
		const res = await fetch("/api/employee/login",{
			method:"POST",
			headers:{
				"Authorization":"Bearer "+token
			}
		});

		if(!res.ok){
			const txt = await res.text();
			document.getElementById("status").innerText = `Error: ${res.status} ${txt}`;
			return;
		}

		const data = await res.json();
		document.getElementById("status").innerText = data.message;
		document.getElementById("loginTime").innerText = new Date().toLocaleTimeString();
	}catch(err){
		document.getElementById("status").innerText = "Request failed: " + err.message;
	}

}



async function breakStart(){

	// Server does not implement break-start endpoint; show user-friendly message
	document.getElementById("status").innerText = "Break start is not implemented on the server.";
	document.getElementById("breakStartTime").innerText = new Date().toLocaleTimeString();

}



async function breakEnd(){

	// Server does not implement break-end endpoint; show user-friendly message
	document.getElementById("status").innerText = "Break end is not implemented on the server.";
	document.getElementById("breakEndTime").innerText = new Date().toLocaleTimeString();

}



async function logout(){

	const token = localStorage.getItem("token");
	try{
		const res = await fetch("/api/employee/logout",{
			method:"POST",
			headers:{
				"Authorization":"Bearer "+token
			}
		});

		if(!res.ok){
			const txt = await res.text();
			document.getElementById("status").innerText = `Error: ${res.status} ${txt}`;
			return;
		}

		const data = await res.json();
		document.getElementById("status").innerText = data.message;
		document.getElementById("logoutTime").innerText = new Date().toLocaleTimeString();
	}catch(err){
		document.getElementById("status").innerText = "Request failed: " + err.message;
	}

}

</script>

</body>
</html>
